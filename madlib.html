        <form onclick="return false">
            <div class="form-group">
                    <input type="text" class="form-control bg-warning" id="noun1" placeholder="Enter a noun">
            </div>
            <div class="form-group">
                    <input type="text" class="form-control bg-warning" id="verb1" placeholder="Enter a past tense verb">
            </div>
            <div class="form-group">
                    <input type="text" class="form-control bg-warning" id="prep" placeholder="Enter a preposition">
            </div>
            <div class="form-group">
                    <input type="text" class="form-control bg-warning" id="place" placeholder="Enter a place">
            </div>
            <div class="form-group">
                    <input type="text" class="form-control bg-warning" id="adj" placeholder="Enter an adjective">
            </div>
            <div class="form-group">
                    <input type="text" class="form-control bg-warning" id="noun2" placeholder="Enter a noun">
            </div>
            <div class="form-group">
                    <input type="text" class="form-control bg-warning" id="verb2" placeholder="Enter a verb">
            </div>
            <div class="form-group">
                    <input type="text" class="form-control bg-warning" id="emotion" placeholder="Enter an emotion">
            </div>
            <button type="button" onclick="showInfo()" class="bg-warning rounded">Submit</button>
        </form>
        <p id="madlib" class="bg-primary text-light rounded text-center">
        <script>
        function showInfo() {
            var noun1 = document.getElementById("noun1").value;
            var verb1 = document.getElementById("verb1").value;
            var prep = document.getElementById("prep").value;
            var place = document.getElementById("place").value;
            var adj = document.getElementById("adj").value;
            var noun2 = document.getElementById("noun2").value;
            var verb2 = document.getElementById("verb2").value;
            var emotion = document.getElementById("emotion").value;
            
            document.getElementById("madlib").innerHTML=("<p>The "+noun1+" "+verb1+" "+prep+" the "+place+" and saw a(n) "+adj+" "+noun2+". Then they "+verb2+" in "+emotion+".</p>");
        }
        </script>
